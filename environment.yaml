name: esa_dlstem
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # ── Core scientific stack (via conda) ─────────────────────────────────────
  - numpy>=1.26
  - scipy>=1.13          # Hungarian matching in DINOv3/SAM2 loss
  - opencv>=4.9          # cv2 — frame I/O, annotation, video writing
  - pandas>=2.2          # CSV metrics output in eval scripts
  - matplotlib>=3.8      # plotting
  - tqdm>=4.66           # progress bars
  - pillow>=10.0         # image I/O fallback
  - pip

  # ── pip packages ──────────────────────────────────────────────────────────
  - pip:
    # PyTorch — CUDA 12.4 wheels (compatible with CUDA 13.1 driver)
    # If a newer cu1xx wheel is available at pytorch.org, replace cu124 below
    - torch --index-url https://download.pytorch.org/whl/cu124
    - torchvision --index-url https://download.pytorch.org/whl/cu124

    # Lightning training framework
    - lightning>=2.2
    - torchmetrics[detection]>=1.3   # MeanAveragePrecision

    # YOLO (Ultralytics, includes ByteTrack)
    - ultralytics>=8.2

    # DINOv3 via HuggingFace (requires transformers >= 4.56.0)
    - transformers>=4.56.0
    - huggingface-hub>=0.23

    # SAM2 (install from Facebook Research GitHub)
    # Uncomment one of the two lines below:
    # - sam2                             # if published to PyPI
    # - git+https://github.com/facebookresearch/sam2.git  # from source
