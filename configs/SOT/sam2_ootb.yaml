# SAM2 evaluation on OOTB (traffic, single-object tracking)
# Usage: python eval_sam2.py --config configs/SOT/sam2_ootb.yaml

dataset: OOTB
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/OOTB
class_map:
  car: 0
  plane: 1
  ship: 2
  train: 3

eval_mode: sot
img_size: null

sam2_model_id: facebook/sam2.1-hiera-large
prompt_strategy: first_frame
prompt_interval: 10

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: anonymous
