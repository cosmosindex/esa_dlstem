# LoRAT (ECCV 2024) evaluation on OOTB — Oriented Object Tracking Benchmark.
# Usage: python eval_lorat.py --config configs/SOT/lorat_ootb.yaml
#
# OBB handling:
#   LoRAT outputs axis-aligned HBB only. OOTB GT is a rotated 4-corner polygon.
#   We evaluate under the **official OOTB v1.0 protocol** (polygon → AABB → IoU),
#   matching the other HBB trackers (OSTrack / ODTrack / SAMURAI) in this repo.

dataset: OOTB
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/OOTB
class_map:
  car: 0
  plane: 1
  ship: 2
  train: 3

eval_mode: sot
obb_eval_mode: ootb_aabb       # OOTB protocol: polygon → AABB → AABB IoU
img_size: null

variant: g-378
lorat_root: /home/ziwen/code/esa_dlstem/LoRAT
method_name: LoRAT
ckpt_path: /work/ziwen/checkpoints/lorat/lorat_g378.bin

prompt_strategy: first_frame
prompt_interval: 10

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: chengziwen693
