# ODTrack (AAAI 2024) evaluation on SatSOT — single-object tracking, HBB.
# Usage: python eval_odtrack.py --config configs/SOT/odtrack_satsot.yaml

dataset: SatSOT
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/SatSOT
class_map:
  car: 0
  plane: 1
  ship: 2
  train: 3

eval_mode: sot
img_size: null

# ODTrack variant: "baseline" (ViT-B, 371MB) or "baseline_large" (ViT-L, 1.2GB)
variant: baseline_large
yaml_path: /home/anon/code/esa_dlstem/ODTrack/experiments/odtrack/baseline_large.yaml
ckpt_path: /work/anon/checkpoints/odtrack/baseline_large/ODTrack_ep0300.pth.tar

prompt_strategy: first_frame
prompt_interval: 10

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: anonymous
