# OSTrack-384 (ECCV 2022) evaluation on OOTB — Oriented Object Tracking Benchmark.
# Usage: python eval_ostrack.py --config configs/SOT/ostrack_ootb.yaml
#
# OBB handling:
#   OSTrack outputs axis-aligned HBB only. OOTB GT is a rotated 4-corner polygon.
#   We evaluate under the **official OOTB v1.0 protocol**
#   (tracker_benchmark_v1.0/rstEval/): both GT and pred polygons are collapsed
#   to their min/max AABB, then standard AABB IoU is computed. This matches
#   the numbers reported for the 33 trackers in the OOTB ISPRS 2024 paper
#   and is the correct protocol for HBB-only trackers.

dataset: OOTB
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/OOTB
class_map:
  car: 0
  plane: 1
  ship: 2
  train: 3

eval_mode: sot
obb_eval_mode: ootb_aabb       # OOTB protocol: polygon → AABB → AABB IoU
img_size: null

variant: vitb_384_mae_ce_32x4_ep300
yaml_path: /home/ziwen/code/esa_dlstem/OSTrack/experiments/ostrack/vitb_384_mae_ce_32x4_ep300.yaml
ckpt_path: /work/ziwen/checkpoints/ostrack/vitb_384_mae_ce_32x4_ep300/OSTrack_ep0300.pth.tar

prompt_strategy: first_frame
prompt_interval: 10

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: chengziwen693
