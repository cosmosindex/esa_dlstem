# SAM3 open-vocabulary MOT on the **non-car** half of VISO.
# The car category is intentionally dropped here — it is replaced by
# RsCarData (HiEUM's re-curated VISO car subset) in a sibling run, so
# the union of (sam3_viso_no_car + sam3_rscardata) reproduces a "VISO
# with car class swapped" evaluation. See run_sam3_raft_viso.sh.
#
# Test split = official VISO COCO/VOC mapping → seqs:
#   plane/044  (1 seq)
#   ship/047   (1 seq)
#   train/* has no test split.
# Model version: SAM 3.1 (multiplex). See sam3_<ds>.yaml for the SAM 3 baseline.

dataset: VISO
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/VISO
dataset_kwargs:
  categories: [plane, ship, train]
# Distinguish from the full-VISO run dir; compute_hota.py and the RAFT
# filter both look up the dataset variant via this slug.
run_name_suffix: viso_no_car

class_map:
  plane: 0
  ship: 1
  train: 2

eval_mode: mot
split: test
img_size: null

sam3_checkpoint_path: null
apply_temporal_disambiguation: true

tracker_type: text
prompt_strategy: text

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

# Emit per-video MOTChallenge text files for HOTA + RAFT filtering.
# 0.0 keeps everything SAM3 outputs so the RAFT stage gets the full
# tracklet set (otherwise we'd pre-filter low-conf tracks before any
# motion-aware logic could see them).
dump_mot_format: true
mot_dump_score_thresh: 0.0

wandb_project: esa-dlstem
wandb_entity: anonymous

model_version: sam3.1
