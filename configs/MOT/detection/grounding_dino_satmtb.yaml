# GroundingDINO open-vocabulary detection on SAT-MTB.
# Detection-only evaluation; see grounding_dino_airmot.yaml for context.

dataset: SAT-MTB
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/SAT-MTB
class_map:
  airplane: 0
  car: 1
  ship: 2
  train: 3

dataset_kwargs:
  task: mot

eval_mode: mot
det_only_mode: true

split: test
img_size: null

gdino_config_path: GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py
gdino_checkpoint_path: /work/ziwen/checkpoints/grounding_dino/groundingdino_swint_ogc.pth
box_threshold: 0.35
text_threshold: 0.25

prompt_strategy: text

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: chengziwen693
