# SAM3 open-vocabulary MOT on SAT-MTB.
# No GT boxes are ever passed to the model — SAM3's text-prompted detector
# discovers instances per frame. Track IDs reset at each clip boundary.
# Model version: SAM 3.1 (multiplex). See sam3_<ds>.yaml for the SAM 3 baseline.

dataset: SAT-MTB
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/SAT-MTB
# Normalize slug for compute_hota.py regex (dataset.lower() = "sat-mtb").
run_name_suffix: satmtb
class_map:
  airplane: 0
  car: 1
  ship: 2
  train: 3

# Tell SATMTBDataset to load MOT-format annotations
dataset_kwargs:
  task: mot

eval_mode: mot
split: test
img_size: null

sam3_checkpoint_path: null
apply_temporal_disambiguation: true

tracker_type: text
prompt_strategy: text

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

# Emit per-video MOTChallenge text files for HOTA + RAFT filtering.
dump_mot_format: true
mot_dump_score_thresh: 0.0

wandb_project: esa-dlstem
wandb_entity: anonymous

model_version: sam3.1
