# SAM3 open-vocabulary MOT on VISO.
# No GT boxes are ever passed to the model — SAM3's text-prompted detector
# discovers instances per frame. Track IDs reset at each clip boundary.
# VISO category strings are "car" / "plane" / "ship" / "train" (note "plane",
# not "airplane") — class_map keys must match raw categories exactly.

dataset: VISO
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/VISO
class_map:
  car: 0
  plane: 1
  ship: 2
  train: 3

eval_mode: mot
split: test
img_size: null

sam3_checkpoint_path: null
apply_temporal_disambiguation: true

tracker_type: text
prompt_strategy: text

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

wandb_project: esa-dlstem
wandb_entity: anonymous
