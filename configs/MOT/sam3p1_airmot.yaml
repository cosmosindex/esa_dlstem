# SAM3 open-vocabulary MOT on AIR-MOT-100.
# No GT boxes are ever passed to the model — SAM3's text-prompted detector
# discovers instances per frame. Track IDs are NOT preserved across clips
# (video_tracker_module.py skips carry-over for prompt_strategy=text), so
# expect IDF1 / IDsw to degrade at clip_len=32.
# Model version: SAM 3.1 (multiplex). See sam3_<ds>.yaml for the SAM 3 baseline.

dataset: AIR-MOT
dataset_root: /data/ESA_DLSTEM_2025/data/trafic/AIR-MOT-100
# Normalize the run-dir slug so compute_hota.py's regex picks it up
# (the dataset_name lower-case form would be "air-mot" with a hyphen).
run_name_suffix: airmot
class_map:
  airplane: 0
  ship: 1

eval_mode: mot
split: test
img_size: null

sam3_checkpoint_path: null
apply_temporal_disambiguation: true

tracker_type: text
prompt_strategy: text

clip_len: 32
clip_stride: 1
batch_size: 1
num_workers: 0

iou_thresh: 0.3
score_thresh: 0.5
max_wandb_images: 50

# Emit per-video MOTChallenge text files for HOTA + RAFT filtering.
dump_mot_format: true
mot_dump_score_thresh: 0.0

wandb_project: esa-dlstem
wandb_entity: anonymous

model_version: sam3.1
