# Faster R-CNN (R50-FPN) trained on BIRDSAI (wild-animal thermal drone MOT) — detection.
# Apple-to-apple companion to yolo11_birdsai.yaml / dinov3_birdsai.yaml — same data
# (BIRDSAI_MOT per-frame boxes), same 2 classes {animal, human}, same 640² input.
# Train on TrainReal, validate/test on TestReal (val 30% / test 70%, seed 42).
#
# Box-size rationale (from BIRDSAI bbox stats, original scale):
#   - 49.9% of all boxes are < 32×32; human/lion/giraffe/dog/unknown are ~100% small
#     (~10-28 px sides). elephant is the only large class (median ~50-66 px, max ~120 px).
#   - Effectively NO large objects → anchor pyramid skewed small (4 → 128 px) vs the
#     fire pyramid which reached 640 px for near-full-frame smoke.
# min_size=max_size=640 makes the internal GeneralizedRCNNTransform a no-op.
#
# Run with:
#   CUDA_VISIBLE_DEVICES=1 python training_scripts/train_fasterrcnn_fire.py \
#       --config configs/Detection/fasterrcnn_birdsai.yaml

# ----- Dataset roots ------------------------------------------------------
datasets:
  BIRDSAI_MOT: /data/ESA_DLSTEM_2025/data/wild_animal/BIRDSAI

# Fine-grained species labels (CSV species col): dog (test-only) + unlabeled → "unknown".
per_dataset_kwargs:
  BIRDSAI_MOT:
    granularity: fine

# ----- Class map (1-indexed; 0 = background) ------------------------------
class_map:
  human:    1
  elephant: 2
  giraffe:  3
  lion:     4
  unknown:  5

num_classes: 6              # 5 foreground + 1 background

# ----- Model --------------------------------------------------------------
use_v2: false
pretrained: true
trainable_backbone_layers: 3
score_thresh: 0.05
nms_thresh: 0.5
detections_per_img: 300

# Data-driven anchor pyramid (BIRDSAI train, measured in the 640x640 MODEL space —
# frames are A.Resize(640,640)'d, so heights are stretched x1.333 vs original px).
# Side=sqrt(w*h) percentiles: p1=9 p25=16 p50=40 p75=55 p90=90 p99=145.
#   - The old [4,8] P2 level was dead: 4px/8px anchors cover 0.0%/0.4% of boxes
#     (no object is that small in model space) → smallest level lifted to [10,16].
# Aspect ratio is h/w (torchvision convention). Measured w/h median=0.51 → objects
# are ~2x TALLER than wide; w/h p95=0.95 means almost nothing is wider than square.
#   - Old {0.5,1.0,2.0} wasted 0.5 (wide) entirely → replaced with tall {1.0,2.0,3.5}.
anchor_sizes:                 # FPN P2..P6, strides 4/8/16/32/64
  - [10, 16]
  - [24, 36]
  - [48, 72]
  - [96, 128]
  - [160, 200]
anchor_aspect_ratios:         # h/w — skewed tall to match the data
  - [1.0, 2.0, 3.5]
  - [1.0, 2.0, 3.5]
  - [1.0, 2.0, 3.5]
  - [1.0, 2.0, 3.5]
  - [1.0, 2.0, 3.5]

# Relaxed RPN/box thresholds for tiny boxes.
rpn_fg_iou_thresh: 0.5
rpn_bg_iou_thresh: 0.2
box_fg_iou_thresh: 0.4
box_bg_iou_thresh: 0.3
rpn_pre_nms_top_n_train: 4000
rpn_post_nms_top_n_train: 2000

min_size: 640
max_size: 640

# ----- Training transform -------------------------------------------------
img_size: 640

# ----- Lightning training -------------------------------------------------
batch_size: 8
num_workers: 0
max_epochs: 30
lr: 5.0e-4
weight_decay: 1.0e-4
warmup_epochs: 3
lr_scheduler: cosine
precision: 16-mixed

# ----- Run / logging ------------------------------------------------------
run_name: fasterrcnn_birdsai
experiment_root: /work/anon/experiments
wandb_project: esa-dlstem
wandb_entity: anonymous
skip_visualization: true
visualization_score_thresh: 0.5

monitor_metric: val/mAP
monitor_mode: max
patience: 8
# Train the full schedule (no early stop) and also keep last.ckpt (final epoch),
# so a too-early val-selected best can't truncate training.
early_stopping: false
