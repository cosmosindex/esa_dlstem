# Faster R-CNN trained on SAT-MTB **HBB detection** annotations only.
#
# Why a separate config from fasterrcnn_satmot.yaml: that one trains on a
# union of 5 datasets where every label comes from MOT annotations, which
# only cover *moving* objects. SAT-MTB is the only dataset in the project
# that ships dense per-frame detection ground truth (`det/HBB/*.xml`) for
# *all* instances — static and moving. Training a detector that recognises
# parked planes / docked ships requires this denser annotation.
#
# SAT-MTB det_hbb only carries the **3 coarse classes** {airplane, ship,
# train}. The `car` class has no HBB XMLs (per docs/bbox_stats — and per
# the SAT-MTB MOT-protocol memo: car detection labels live exclusively in
# the MOT CSV). So this config is a 3-class detector. If you need a car
# detector too, train a separate one on RsCarData / SAT-MTB MOT.
#
# Splits (from analyze_satmtb_bbox.py): 84 train + 18 val + 40 test seqs;
# 18.9k / 4.2k / 9.9k frames; 297k boxes total. ~40% are small (<32²),
# dominated by ships; airplanes are mid-sized; trains are huge.
#
# Run with:
#   python training_scripts/train_fasterrcnn_satmot.py \
#       --config configs/Detection/fasterrcnn_satmtb_hbb.yaml

# ----- Dataset roots ------------------------------------------------------
datasets:
  SAT-MTB: /data/ESA_DLSTEM_2025/data/trafic/SAT-MTB

per_dataset_kwargs:
  SAT-MTB:
    task: det_hbb            # XML HBB labels (all instances, static + moving)

# ----- Class map ----------------------------------------------------------
# Reflects what det_hbb XMLs actually carry (no `car`).
class_map:
  airplane: 1
  ship:     2
  train:    3

num_classes: 4               # 3 foreground + 1 background

# ----- Model --------------------------------------------------------------
use_v2: false                # see fasterrcnn_satmot.yaml for the v1/v2 note
pretrained: true
trainable_backbone_layers: 3
score_thresh: 0.05
nms_thresh: 0.5
detections_per_img: 300

# SAT-MTB det_hbb anchor pyramid, DATA-DRIVEN from the TRAIN-split
# side-length (max(w,h)) percentiles per class (bbox stats + k-means over
# 183 k boxes). The three classes span a huge scale range and two of them
# are strongly non-square, so the pyramid is re-derived rather than using
# the stride×{2,4} textbook default:
#   ship     n=75 k : p5=5  p25=8  p50=17  p75=39  p95=87  (tiny, and
#                      elongated — aspect w/h p5=0.55 .. p95=2.50)
#   airplane n=105k : p5=24 p50=48 p95=108                 (near-square)
#   train    n=4  k : p25=120 p50=195 p95=524 max=650      (huge, very
#                      elongated — aspect p95≈18)
# k-means(10) anchor scales over pooled sides: 6 11 18 27 34 43 55 75 104 300.
#
# Each level = one FPN stride; two sizes/level bracket the k-means scales.
#   P2 stride 4  → [6, 12]      ship p1–p25 (4–9 px)
#   P3 stride 8  → [20, 32]     ship p50 (17) + small airplane
#   P4 stride 16 → [48, 72]     airplane p50 (48) + ship p75–p90
#   P5 stride 32 → [104, 160]   airplane p95 (108) + small train
#   P6 stride 64 → [256, 448]   train p50–p95 (195–524; regression covers 650)
# Aspect ratios widened to {0.33 .. 3.0} on every level (uniform count is
# required — torchvision RPNHead shares one conv across levels) to catch the
# elongated ships and trains that {0.5,1,2} misses. 2 sizes × 5 ratios = 10.
anchor_sizes:
  - [6, 12]
  - [20, 32]
  - [48, 72]
  - [104, 160]
  - [256, 448]
anchor_aspect_ratios:
  - [0.33, 0.5, 1.0, 2.0, 3.0]
  - [0.33, 0.5, 1.0, 2.0, 3.0]
  - [0.33, 0.5, 1.0, 2.0, 3.0]
  - [0.33, 0.5, 1.0, 2.0, 3.0]
  - [0.33, 0.5, 1.0, 2.0, 3.0]

# Relaxed RPN/box thresholds for small-object recall.
rpn_fg_iou_thresh: 0.5
rpn_bg_iou_thresh: 0.2
box_fg_iou_thresh: 0.4
box_bg_iou_thresh: 0.3
rpn_pre_nms_top_n_train: 4000
rpn_post_nms_top_n_train: 2000

min_size: 1024
max_size: 1333

# ----- Training transform -------------------------------------------------
train_crop_size: 1024

# ----- Lightning training -------------------------------------------------
batch_size: 4
num_workers: 0
max_epochs: 30
lr: 5.0e-4
weight_decay: 1.0e-4
warmup_epochs: 3
lr_scheduler: cosine
precision: 16-mixed

# ----- Run / logging ------------------------------------------------------
run_name: fasterrcnn_satmtb_hbb
experiment_root: /work/anon/experiments
wandb_project: esa-dlstem
wandb_entity: anonymous
# No visualization saving — keep only the best checkpoint; per-frame predicted
# boxes are dumped separately by evaluation/eval_satmtb_detect_dump.py.
skip_visualization: true
visualization_max_wandb_images: 50
visualization_score_thresh: 0.5
visualization_iou_thresh: 0.5

monitor_metric: val/mAP
monitor_mode: max
patience: 8
